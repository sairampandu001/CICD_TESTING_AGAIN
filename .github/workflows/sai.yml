name: My Github actions Cicd Pipeline Testing Again

on:
  push:
    branches: main

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - name: get code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: build image in docker
        run: docker build -t sairampandu/ss_sai .
      - name: push to  docker hub
        run: docker push sairampandu/ss_sai
      - name: Execute remote SSH commands using password
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          key: ${{ secrets.KEY }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            docker pull sairampandu/ss_sai
            docker stop app || true
            docker rm app || true
            docker run -d -p 3000:80 --name app sairampandu/ss_sai
          
